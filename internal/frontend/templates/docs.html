<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} - Rayboard Docs</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17202a; background: #f6f7f9; }
    body { margin: 0; }
    a { color: #1f5fbf; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 100vh; }
    nav { background: #ffffff; border-right: 1px solid #d8dee8; padding: 24px 18px; position: sticky; top: 0; height: 100vh; overflow: auto; box-sizing: border-box; }
    nav h1 { font-size: 18px; margin: 0 0 18px; }
    nav a { display: block; padding: 8px 10px; border-radius: 6px; color: #27364a; font-size: 14px; }
    nav a.current { background: #e7eefc; color: #113b83; font-weight: 650; }
    main { padding: 36px min(7vw, 72px); }
    article { max-width: 960px; }
    h1, h2, h3, h4 { line-height: 1.2; margin: 28px 0 12px; }
    h1 { font-size: 34px; margin-top: 0; }
    h2 { font-size: 24px; border-top: 1px solid #d8dee8; padding-top: 24px; }
    p, li, td { font-size: 15px; line-height: 1.65; }
    code { background: #e9edf3; border-radius: 4px; padding: 2px 5px; }
    pre { background: #16202e; color: #eef4ff; padding: 16px; border-radius: 8px; overflow: auto; }
    pre code { background: transparent; padding: 0; }
    table { border-collapse: collapse; width: 100%; background: #ffffff; margin: 16px 0; }
    td { border: 1px solid #d8dee8; padding: 8px 10px; vertical-align: top; }
    @media (max-width: 760px) {
      .shell { display: block; }
      nav { height: auto; position: static; border-right: 0; border-bottom: 1px solid #d8dee8; }
      main { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav aria-label="Documentation">
      <h1>Rayboard Docs</h1>
      {{range .Pages}}
        <a href="/docs/{{.Slug}}" class="{{if .Current}}current{{end}}">{{.Title}}</a>
      {{end}}
    </nav>
    <main>
      <article>
        {{.HTML}}
      </article>
    </main>
  </div>
</body>
</html>
